# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
     id-token: write
     contents: read
     checks: write

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: | 
          8.0.x
          9.0.x
          10.0.x
    - name: Install Mono
      run: sudo apt-get update && sudo apt-get install -y mono-complete
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal --results-directory ./TestResults --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results.trx"
    - name: Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: DotNET Tests
        path: "**/test-results.trx"                            
        reporter: dotnet-trx
        fail-on-error: true
    - name: Install ReportGenerator
      if: always()
      run: dotnet tool install --global dotnet-reportgenerator-globaltool
    - name: Generate coverage summary
      if: always()
      shell: bash
      run: |
        shopt -s globstar nullglob
        files=(TestResults/**/coverage.cobertura.xml)
        if [ ${#files[@]} -eq 0 ]; then
          mkdir -p CoverageReport
          echo "No coverage files were generated." > CoverageReport/SummaryGithub.md
          exit 0
        fi
        ~/.dotnet/tools/reportgenerator "-reports:TestResults/**/coverage.cobertura.xml" "-targetdir:CoverageReport" "-reporttypes:HtmlInline;MarkdownSummaryGithub"
    - name: Publish coverage summary
      if: always()
      run: cat CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
    - name: Upload coverage artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: CoverageReport
