version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    ignore:
      # Both CodeAnalysis packages must be updated manually:
      # - Microsoft.CodeAnalysis.CSharp sets the minimum Roslyn/SDK version floor for all consumers
      #   and requires a matching PackagePath change in SourceGenerator.csproj.
      # - Microsoft.CodeAnalysis.Analyzers can break the TreatWarningsAsErrors build with new rules.
      - dependency-name: "Microsoft.CodeAnalysis.CSharp"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "Microsoft.CodeAnalysis.Analyzers"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
    groups:
      test-dependencies:
        patterns:
          - "NUnit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:30"
      timezone: "UTC"
    open-pull-requests-limit: 10
